name: 'european_energy'
version: '1.0.0'
require-dbt-version: [">=1.7.0"]
profile: 'european_energy'

config-version: 2

vars:
  country: 'GR'
  country_name: 'Greece'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  european_energy:
    staging:
      +materialized: view
      +tags: ['staging']
    intermediate:
      +materialized: table
      +tags: ['intermediate']
    mart:
      +materialized: table
      +tags: ['mart', 'dashboard']
