id: dbt_quality
namespace: european_energy

description: |
  Refresh BigQuery raw external tables in the `european_energy` dataset,
  build dbt staging views, and run source/staging data-quality tests.
  Intended to run after `spark_transform` has produced fresh silver Parquet in GCS.

tasks:
  - id: refresh_raw_and_test_staging
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    env:
      GCP_SERVICE_ACCOUNT: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
      GCP_PROJECT_ID: "{{ kv('GCP_PROJECT_ID') }}"
      GCP_LOCATION: "{{ kv('GCP_LOCATION') }}"
      GCP_BUCKET_NAME: "{{ kv('GCP_BUCKET_NAME') }}"
      GCP_DATASET: "{{ kv('GCP_DATASET') }}"
    script: |
      import json
      import os
      import subprocess
      import sys
      import tempfile


      def run(cmd, env=None):
          result = subprocess.run(cmd, capture_output=True, text=True, env=env)
          print(result.stdout)
          if result.returncode != 0:
              print(result.stderr, file=sys.stderr)
              sys.exit(result.returncode)


      run([
          "/bin/sh",
          "-c",
          (
              "set -e\n"
              "uv pip install --system dbt-bigquery google-cloud-bigquery "
              "|| python -m pip install --user --no-cache-dir dbt-bigquery google-cloud-bigquery"
          ),
      ])

      from google.cloud import bigquery
      from google.oauth2 import service_account

      credentials_info = json.loads(os.environ["GCP_SERVICE_ACCOUNT"])
      project_id = os.environ["GCP_PROJECT_ID"]
      location = os.environ["GCP_LOCATION"]
      bucket = os.environ["GCP_BUCKET_NAME"]
      dataset = os.environ["GCP_DATASET"]

      credentials = service_account.Credentials.from_service_account_info(credentials_info)
      client = bigquery.Client(project=project_id, credentials=credentials)

      statements = [
          f"""
          create schema if not exists `{project_id}.{dataset}`
          options(location="{location}")
          """,
          f"""
          create or replace external table `{project_id}.{dataset}.raw_entsoe_generation`
          options (
            format="PARQUET",
            uris=["gs://{bucket}/silver/entsoe/*"]
          )
          """,
          f"""
          create or replace external table `{project_id}.{dataset}.raw_era5_weather`
          options (
            format="PARQUET",
            uris=["gs://{bucket}/silver/era5/*"]
          )
          """,
      ]

      for statement in statements:
          print(statement.strip())
          client.query(statement, location=location).result()

      with tempfile.NamedTemporaryFile("w", suffix=".json", delete=False) as handle:
          json.dump(credentials_info, handle)
          keyfile_path = handle.name

      dbt_env = os.environ.copy()
      dbt_env["GCP_SERVICE_ACCOUNT_PATH"] = keyfile_path
      dbt_env["GOOGLE_APPLICATION_CREDENTIALS"] = keyfile_path
      dbt_env["GCS_BUCKET"] = bucket
      dbt_project_dir = os.environ["DBT_PROJECT_DIR"]

      run(["dbt", "deps", "--profiles-dir", dbt_project_dir, "--project-dir", dbt_project_dir], env=dbt_env)
      run(["dbt", "run", "--profiles-dir", dbt_project_dir, "--project-dir", dbt_project_dir, "--select", "tag:staging"], env=dbt_env)
      run(["dbt", "test", "--profiles-dir", dbt_project_dir, "--project-dir", dbt_project_dir, "--select", "source:* tag:staging"], env=dbt_env)

      print("Raw external tables refreshed and staging tests passed.")

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
      projectId: "{{ kv('GCP_PROJECT_ID') }}"
      location: "{{ kv('GCP_LOCATION') }}"
      bucket: "{{ kv('GCP_BUCKET_NAME') }}"
