id: backfill_pipeline
namespace: european_energy

description: |
  Manual backfill pipeline for one country or all supported countries.
  Uses Schedule trigger with Kestra backfill to select date range.
  Date is resolved from trigger.date in variables (like taxi flow).
  To backfill: use "Execute backfill" from the UI on the trigger.

inputs:
  - id: country
    type: SELECT
    defaults: "ALL"
    values:
      - ALL
      - GR
      - DE
      - FR
      - PL
      - ES
      - DK
      - SE
      - IT

  - id: era5_mode
    type: SELECT
    defaults: "monthly"
    description: "monthly = one CDS request per category per month (faster for backfills). daily = one request per day."
    values:
      - monthly
      - daily

variables:
  date: "{{ trigger.date | date('yyyy-MM-dd') }}"

tasks:
  - id: set_labels
    type: io.kestra.plugin.core.execution.Labels
    labels:
      pipeline: backfill
      country: "{{ inputs.country }}"
      date: "{{ render(vars.date) }}"

  - id: process_countries
    type: io.kestra.plugin.core.flow.ForEach
    concurrencyLimit: 1
    values: "{{ fromJson(inputs.country == 'ALL' ? '[\"DE\", \"DK\", \"ES\", \"FR\", \"GR\", \"IT\", \"PL\", \"SE\"]' : '[\"' ~ inputs.country ~ '\"]') }}"
    tasks:
      - id: ingest_day
        type: io.kestra.plugin.core.flow.Subflow
        namespace: european_energy
        flowId: entsoe_ingest
        wait: true
        transmitFailed: false
        inputs:
          start_date: "{{ render(vars.date) }}"
          end_date: "{{ render(vars.date) | dateAdd(1, 'DAYS') | date('yyyy-MM-dd') }}"
          country: "{{ taskrun.value }}"

      - id: era5_ingest_day
        type: io.kestra.plugin.core.flow.Subflow
        namespace: european_energy
        flowId: era5_ingest
        wait: true
        transmitFailed: false
        inputs:
          date: "{{ render(vars.date) }}"
          country: "{{ taskrun.value }}"
          mode: "{{ inputs.era5_mode }}"

      - id: refresh_silver
        type: io.kestra.plugin.core.flow.Subflow
        namespace: european_energy
        flowId: spark_transform
        wait: true
        transmitFailed: true
        inputs:
          country: "{{ taskrun.value }}"
          date_range: "{{ render(vars.date) }}/{{ render(vars.date) }}"

  - id: validate_staging
    type: io.kestra.plugin.core.flow.Subflow
    namespace: european_energy
    flowId: dbt_quality
    wait: true
    transmitFailed: true

  - id: build_marts
    type: io.kestra.plugin.core.flow.Subflow
    namespace: european_energy
    flowId: dbt_mart
    wait: true
    transmitFailed: true

triggers:
  - id: backfill
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"
